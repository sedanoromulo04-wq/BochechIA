    - pedro-sobral.md
    - ad-midas.md
    - media-buyer.md
    - performance-analyst.md
    - creative-analyst.md
    - scale-optimizer.md
    - pixel-specialist.md
    - ads-analyst.md
    - fiscal.md
  tasks:
    - analyze-performance.md
    - audit-ad-account.md
    - create-ad-creative.md
    - create-ad-strategy.md
    - diagnose.md
    - manage-budget.md
    - review.md
    - scale-campaign.md
    - setup-tracking.md
  workflows:
    - wf-account-audit.yaml
    - wf-campaign-launch.yaml
  checklists:
