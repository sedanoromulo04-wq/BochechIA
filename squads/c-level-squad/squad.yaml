name: c-level-squad
version: "1.0.0"
short-title: "C-Level Squad"
description: "C-suite virtual de 6 executivos — CEO (Vision Chief), COO, CMO, CTO, CIO, CAIO. Estrategia, operacoes, marketing, tecnologia, AI."
author: "Synkra AIOS"
license: MIT
slashPrefix: "c-level-squad"

aios:
  minVersion: "4.0.0"
  type: squad

tags:
  - c-suite
  - strategy
  - operations
  - marketing
  - technology
  - ai
  - leadership

components:
  agents:
    - vision-chief.md
    - coo-orchestrator.md
    - cmo-architect.md
    - cto-architect.md
    - cio-engineer.md
    - caio-architect.md
  tasks:
    - design-operations.md
    - diagnose.md
    - evaluate-technology.md
    - plan-fundraise.md
    - plan-go-to-market.md
    - review.md
    - set-vision.md
  workflows:
    - wf-board-presentation.yaml
    - wf-strategic-planning.yaml
  checklists:
    - output-quality.md

config:
  extends: extend

routing:
  tier_0: claude-sonnet-4-6
  tier_1: claude-opus-4-6
  task_simple: claude-sonnet-4-6
  task_complex: claude-opus-4-6
  client_data: claude-opus-4-6

mem0:
  scope:
    - executive_decisions
    - strategic_risks
    - board_context
    - operating_constraints
    - market_bets
    - approved_plans
  load_on_start: true
  save_on_complete: true

privacy:
  client_data_model: claude
  internal_tasks_model: claude
