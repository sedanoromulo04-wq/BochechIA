    - nancy-duarte.md
    - matthew-dicks.md
    - marshall-ganz.md
    - kindra-hall.md
    - keith-johnstone.md
    - joseph-campbell.md
    - dan-harmon.md
    - blake-snyder.md
    - movement-chief.md
