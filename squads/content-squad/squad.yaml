    - manifestador.md
    - identitario.md
    - fenomenologo.md
    - estrategista-de-ciclo.md
    - analista-de-impacto.md
  tasks:
    - analyze-story.md
    - build-narrative.md
    - create-pitch.md
    - create-presentation.md
    - unblock-creative.md
    - write-manifesto.md
    - analyze-phenomenon.md
    - build-movement.md
    - create-identity.md
    - measure-impact.md
    - diagnose.md
