version: "1.1.0"
updated: "2026-04-26"
description: "Roteamento de modelos do BochechIA. Fonte da verdade para decisões de qual modelo usar."

# Regra de privacidade — sobrescreve qualquer outra regra
privacy:
  client_data_model: claude-sonnet-4-6
  rule: "Se a tarefa envolve dados reais de cliente (nome, marca, estratégia, copy aprovado),
         use SEMPRE claude-sonnet-4-6 ou superior. Nunca Alibaba/Qwen para dados de cliente."

# Modelos disponíveis
models:
  flash:
    id: qwen3.5-flash
    provider: alibaba
    cost_input: 0.03   # USD por 1M tokens
    cost_output: 0.29
    context: 1000000
    use_for: tarefas simples, orquestração interna, formatação, revisão rápida

  pro:
    id: qwen3.5-plus
    provider: alibaba
    cost_input: 0.40
    cost_output: 2.40
    context: 1000000
    use_for: copy estruturado, análise de frameworks, email sequences, pesquisa

  sonnet:
    id: claude-sonnet-4-6
    cost_input: 3.00
    cost_output: 15.00
    context: 200000
    use_for: estratégia de marca, copy de alto valor, brand foundation, dados de cliente

  opus:
    id: claude-opus-4-6
    cost_input: 15.00
    cost_output: 75.00
    context: 200000
    use_for: decisões C-level, posicionamento crítico, tese de categoria, raramente

# Roteamento por squad
squads:
  copy-squad:
    chief: flash          # orquestrador — roteamento interno
    tier_1a: pro          # Direct Response Legends — alta complexidade
    tier_1b: pro          # Modern & Funnels
    tier_1c: flash        # Email & Relationship — alta frequência
    tier_1d: pro          # Offers & Sales Pages
    task_simple: flash    # write-headline, write-bullets, review
    task_complex: sonnet  # write-sales-letter, write-vsl-script com dados de cliente

  hormozi-squad:
    chief: flash
    advisor: pro
    offers: pro
    pricing: pro
    leads: pro
    copy: pro
    ads: pro
    content: flash
    hooks: flash
    launch: pro
    closer: pro
    workshop: pro
    retention: flash
    scale: pro
    models: flash
    audit: flash

  brand-squad:
    default: sonnet       # sempre Sonnet — dados de marca são dados de cliente
    critical: opus        # posicionamento final, tese aprovada

  c-level-squad:
    default: opus         # decisões estratégicas críticas
    advisory: sonnet      # análise e brainstorm
    reports: flash        # formatação de relatórios

  content-squad:
    storytelling: sonnet
    movement: sonnet
    hooks: flash
    calendar: flash

  traffic-masters:
    strategy: pro
    analysis: pro
    reports: flash
    creative_brief: sonnet  # briefing com dados de cliente

  data-squad:
    analysis: pro
    formatting: flash
    insights: pro
    report_generation: flash

# Roteamento por tipo de tarefa (independente do squad)
